name: CI

on:
  push:
    branches: [main]
    paths:
      - 'node/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'node/**'
      - '.github/workflows/ci.yml'

jobs:
  node-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd node && npm ci
      - run: cd node && npx vitest run