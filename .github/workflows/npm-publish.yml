# Publish the Node package to npm when a GitHub release is created.

name: Publish npm package

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - run: cd node && npm ci
      - name: Check if version already exists on npm
        id: npm-check
        run: |
          cd node
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "$PKG_NAME@$PKG_VERSION" version > /dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version $PKG_VERSION is already published for $PKG_NAME."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "Version $PKG_VERSION is not published yet for $PKG_NAME."
          fi
      - run: cd node && npm publish --access public
        if: steps.npm-check.outputs.already_published == 'false'
        env:
          NODE_AUTH_TOKEN: ${{secrets.npm_token}}
